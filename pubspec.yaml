name: dont_touch_my_phone
description: A security app that detects unauthorized phone access and triggers alarms.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Sensors
  sensors_plus: ^4.0.2
  
  # Camera
  camera: ^0.10.5+9
  
  # Audio
  audioplayers: ^5.2.1
  
  # Vibration
  vibration: ^3.1.8
  
  # Flashlight
  torch_light: ^1.0.0
  
  # Local storage
  shared_preferences: ^2.2.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  
  # Background service
  flutter_background_service: ^5.0.5
  flutter_local_notifications: ^17.0.0
  
  # Biometric auth
  local_auth: ^2.1.8
  
  # Permission handling
  permission_handler: ^11.1.0
  
  # UI utilities
  flutter_animate: ^4.5.0
  google_fonts: ^6.1.0
  
  # Path provider
  path_provider: ^2.1.2
  
  # UUID for log entries
  uuid: ^4.3.3
  
  # intl for date formatting
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  hive_generator: ^2.0.1
  build_runner: ^2.4.8
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/sounds/
    - assets/images/
